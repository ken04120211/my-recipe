version: 1
frontend:
  phases:
    preBuild:
      commands:
        - echo "No pre-build required"
    build:
      commands:
        - echo "No build required"
    postBuild:
      commands:
        - echo "No post-build required"
  artifacts:
    baseDirectory: /
    files:
      - '**/*'
  cache:
    paths: []
backend:
  phases:
    deploy:
      commands:
        - pip install -r requirements.txt
        - python app.py