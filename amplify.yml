version: 1
frontend:
  phases:
    preBuild:
      commands:
        - pip install -r requirements.txt
    build:
      commands:
        - echo "Building static files"
        - python3 -c "import os; os.makedirs('dist', exist_ok=True)"
        - python3 -c "from flask import Flask, render_template; app = Flask(__name__, template_folder='templates'); def index(): return render_template('index.html'); app.add_url_rule('/', 'index', index); with app.test_request_context(): open('dist/index.html', 'w').write(index())"
    postBuild:
      commands:
        - echo "Post build complete"
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths: []