<!DOCTYPE html>
<html>
<head>
    <title>Cooking App</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://unpkg.com/@aws-amplify/ui@5.0.0/dist/aws-amplify-ui.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/@aws-amplify/ui@5.0.0/dist/aws-amplify-ui.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/aws-amplify@5.0.0/lib/aws-amplify.min.js"></script>
</head>
<body>
    <div class="container">
        <header class="d-flex justify-content-center py-3">
            <ul class="nav nav-pills">
                <li class="nav-item"><a href="#" class="nav-link active" aria-current="page">料理一覧</a></li>
                <li class="nav-item"><a href="#" class="nav-link">今日のおすすめ</a></li>
                <li class="nav-item"><a href="#" class="nav-link">履歴</a></li>
                <li class="nav-item"><a href="#" class="nav-link">マイキッチン</a></li>
                <li class="nav-item"><a href="#" class="nav-link">フレンド</a></li>
            </ul>
            <div class="ms-auto">
                <button class="btn btn-outline-primary">User</button>
            </div>
        </header>
        <main>
            <h2>料理一覧</h2>
            <div class="input-group mb-3">
                <input type="text" class="form-control" placeholder="Search recipes" aria-label="Search recipes">
                <button class="btn btn-outline-secondary" type="button">検索</button>
            </div>
            <div id="recipe-list">
                <div class="row">
                </div>
            </div>
        </main>
    </div>
    <script>
        Amplify.configure({
            Auth: {
                identityPoolId: 'YOUR_IDENTITY_POOL_ID',
                region: 'YOUR_REGION',
                userPoolId: 'YOUR_USER_POOL_ID',
                userPoolWebClientId: 'YOUR_USER_POOL_CLIENT_ID'
            }
        });

        const recipeList = document.getElementById('recipe-list');
        const recipes = [
            { name: 'オムライス', imageUrl: 'https://source.unsplash.com/300x300/?omurice', tags: ['卵', 'ご飯', '鶏肉'] },
            { name: 'カレーライス', imageUrl: 'https://source.unsplash.com/300x300/?curry', tags: ['カレー', 'ご飯', '牛肉'] },
            { name: 'ハンバーグ', imageUrl: 'https://source.unsplash.com/300x300/?hamburger', tags: ['牛肉', 'パン粉', '卵'] },
            { name: 'パスタ', imageUrl: 'https://source.unsplash.com/300x300/?pasta', tags: ['パスタ', 'トマト', 'バジル'] },
            { name: 'ラーメン', imageUrl: 'https://source.unsplash.com/300x300/?ramen', tags: ['麺', 'スープ', '豚肉'] },
            { name: '寿司', imageUrl: 'https://source.unsplash.com/300x300/?sushi', tags: ['ご飯', '魚', '海苔'] }
        ];

        recipes.forEach(recipe => {
            const recipeDiv = document.createElement('div');
            recipeDiv.className = 'col-md-4 mb-4';
            recipeDiv.innerHTML = `
                <div class="card">
                    <img src="${recipe.imageUrl}" class="card-img-top" alt="${recipe.name}">
                    <div class="card-body">
                        <h5 class="card-title">${recipe.name}</h5>
                        <p class="card-text">${recipe.tags.join(', ')}</p>
                    </div>
                </div>
            `;
            recipeList.querySelector('.row').appendChild(recipeDiv);
        });
    </script>
</body>
</html>
